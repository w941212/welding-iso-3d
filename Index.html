<!DOCTYPE html>
<html>
<head>
    <title>3D Welding ISO - WPS: 1-1-SM-4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style> body { margin: 0; overflow: hidden; background: #222; } </style>
</head>
<body>
    <script>
        // Elevation 147'-6" -> 134'-9" (약 12.75피트 차이) 시각화 코드
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 배관 (Pipe) 생성
        const geometry = new THREE.CylinderGeometry(0.2, 0.2, 5, 32);
        const material = new THREE.MeshPhongMaterial({ color: 0xaaaaaa, shininess: 100 });
        const pipe = new THREE.Mesh(geometry, material);
        scene.add(pipe);

        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 10;

        function animate() {
            requestAnimationFrame(animate);
            pipe.rotation.y += 0.01; // 현장에서 돌려보는 효과
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
